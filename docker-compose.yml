services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: spond_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spondadmin-network

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - /app/venv
      - backup_data:/app/backups
    env_file:
      - backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spondadmin-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8001/api/v1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - spondadmin-network

volumes:
  postgres_data:
  backup_data:

networks:
  spondadmin-network:
    driver: bridge
