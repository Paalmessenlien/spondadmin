# HTTP - redirect to HTTPS and handle Let's Encrypt challenges
server {
    listen 80;
    server_name admin.lillehammerbueskyttere.no;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name admin.lillehammerbueskyttere.no;

    ssl_certificate /etc/letsencrypt/live/spondadmin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spondadmin/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    # Health check - no rate limit
    location = /health {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/v1/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend:8001/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Frontend
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
