services:
  # TLS termination + reverse proxy is handled by the host's Caddy
  # (see caddy/Caddyfile.example). The backend and frontend publish to
  # 127.0.0.1 ports below so Caddy can `reverse_proxy` to them.

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spond_admin}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - spondadmin-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-spond_admin}
    ports:
      # Bind to loopback only — the host's Caddy proxies to this port.
      # Never expose 8001 publicly; UFW would block it anyway.
      - "127.0.0.1:8001:8001"
    volumes:
      - backup_data:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - spondadmin-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NUXT_PUBLIC_API_BASE: /api/v1
        # Baked into the client bundle at build time — must be a real key
        # in production. Sourced from the server's .env via compose-substitution.
        NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    environment:
      # SSR / Nuxt server middleware also needs the secret key to verify
      # incoming requests on server-rendered pages.
      - NUXT_CLERK_SECRET_KEY=${NUXT_CLERK_SECRET_KEY:-}
      - NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    ports:
      # Bind to loopback only — the host's Caddy proxies to this port.
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - spondadmin-network

volumes:
  postgres_data:
  backup_data:

networks:
  spondadmin-network:
    driver: bridge
