name: Deploy to production

# Triggered only by pushes to `production`. Runs CI first as a single job so
# a failing build never touches the server. Then opens an SSH session to the
# Ubuntu host and runs scripts/deploy.sh, which is the single source of truth
# for what "deploy" means (backup → git pull → docker build → migrate →
# health check).
#
# Secrets required (GH Actions → Settings → Secrets and variables):
#   SSH_HOST         — e.g. 62.238.3.170
#   SSH_USER         — e.g. root  (must have access to PROJECT_DIR and docker)
#   SSH_PRIVATE_KEY  — contents of the private key with access to the server
#   SSH_KNOWN_HOSTS  — output of `ssh-keyscan -H <host>` (prevents MITM on
#                      first connect; rotate by updating this secret)
#
# Optional repo variable:
#   PROJECT_DIR      — server-side path to the cloned repo. Defaults to
#                      /srv/app if not set (matches the standard server prep).
#
# App-level secrets (DB password, Spond credentials, Bunny CDN keys) live in
# the server's .env file. They are intentionally NOT in GitHub Actions so a
# leaked workflow token can't exfiltrate them.
#
# Security note: this workflow never interpolates github.event.* strings
# (PR titles, commit messages, etc.) into `run:` blocks. The only dynamic
# values used are secrets, which go through `env:` and are shell-quoted.

on:
  push:
    branches: [production]
  # Manual trigger as an escape hatch for re-running the latest production
  # commit (e.g. after a server-side config tweak).
  workflow_dispatch:

concurrency:
  # Only one deploy at a time. If a second push lands while the first is
  # running, queue it — don't cancel, because mid-deploy cancellation would
  # leave the server in a half-applied state.
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Re-run CI before deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      # Frontend build — same step as ci.yml. Duplicated rather than reused
      # via workflow_call because the verify job here is the contract:
      # whatever "passes CI" means, we re-verify it before SSH'ing anywhere.
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend build
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          NUXT_PUBLIC_API_BASE: https://admin.lillehammerbueskyttere.no/api/v1
          # Build-time Clerk publishable key. The verify build only needs
          # a parseable placeholder; the real production build runs on the
          # server via docker-compose.prod.yml, which injects the value
          # from the server's .env file (NOT from GitHub Actions secrets).
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          NUXT_CLERK_SECRET_KEY: sk_test_ci_placeholder_not_used_at_runtime

      # Backend smoke check.
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import-check backend
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci.db
          SECRET_KEY: ci-placeholder-key-not-used-at-runtime
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
        run: python -c "from app.main import app; print('OK', app.title)"
      - name: Validate alembic chain
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci.db
          SECRET_KEY: ci-placeholder-key-not-used-at-runtime
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
        run: alembic heads

  deploy:
    name: SSH deploy
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Load SSH key
        # webfactory/ssh-agent adds the key to an ephemeral ssh-agent so we
        # don't leave it on disk.
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        # Keep the known-hosts material in a secret so we can rotate without
        # editing the workflow. If an attacker ever presents a different key,
        # ssh will refuse to connect — much better than StrictHostKeyChecking=no.
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deploy script on server
        # cd to the project dir on the server and run the in-repo script. The
        # script itself does `git pull --ff-only` first, so the server picks
        # up whatever just landed on `production` before building images.
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          PROJECT_DIR: ${{ vars.PROJECT_DIR || '/srv/app' }}
        run: |
          # Keepalive: deploy.sh has long silent steps (pre-deploy backup,
          # on-server frontend build) that can exceed NAT/sshd idle timeouts
          # and drop the session ("client_loop: send disconnect: Broken pipe",
          # exit 255). Send a probe every 30s and tolerate ~10min of true
          # unresponsiveness before giving up.
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "$SSH_USER@$SSH_HOST" "cd '$PROJECT_DIR' && ./scripts/deploy.sh"

      - name: Wait for health check
        # Poll /health for up to 2 minutes. Deploy is considered a failure
        # if the service is still unhealthy after restart — the job turns
        # red and the user sees it in the Actions tab. The endpoint is
        # Caddy → backend FastAPI `/health` which returns 200 when the DB
        # is reachable. Caddy auto-provisions TLS on first request, so
        # this only starts working once the domain's A record points at
        # the server.
        run: |
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 https://admin.lillehammerbueskyttere.no/health >/dev/null; then
              echo "Health check green after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "Health check stayed red for 2 minutes — deploy is not verified."
          echo "SSH to the server and inspect: docker compose -f docker-compose.prod.yml logs --tail 100"
          exit 1
